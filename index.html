  const lblEcon = isEconomia ? 'Economia mensal' : 'Aumento mensal';
  const lblPct = isEconomia ? '-' + Math.abs(pct).toFixed(0) + '%' : '+' + Math.abs(pct).toFixed(0) + '%';
  const valAno = Math.abs(dif * 12);
  const badge = isEconomia
    ? '<span class="badge-econ">&#9660; ' + Math.abs(pct).toFixed(0) + '% mais barato</span>'
    : '<span class="badge-aum">&#9650; ' + Math.abs(pct).toFixed(0) + '% mais caro</span>';

  const div = document.createElement('div');
  div.className = 'seg';
  div.innerHTML =
    '<h2>' + seg.titulo + '  ' + badge + '</h2>' +
    '<div class="desc">' + seg.old.label + ' (antigo) &rarr; ' + seg.novo.label + ' (novo) &middot; comparacao por media mensal de medicoes</div>' +
    '<div class="compare-grid">' +
      '<div class="cardbig old">' +
        '<div><div class="lbl old">Antigo</div><div class="nm">' + seg.old.label + '</div></div>' +
        '<div>' +
          '<div class="total">Media mensal</div>' +
          '<div class="mensal">' + fmtBRL(o.MEDIA) + '</div>' +
          '<div class="info">' + o.MESES + ' meses ativos &middot; total medido ' + fmtBRL(o.TOTAL) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="arrow-box">&rarr;</div>' +
      '<div class="cardbig new">' +
        '<div><div class="lbl new">Novo</div><div class="nm">' + seg.novo.label + '</div></div>' +
        '<div>' +
          '<div class="total">Media mensal</div>' +
          '<div class="mensal">' + fmtBRL(n.MEDIA) + '</div>' +
          '<div class="info">' + n.MESES + ' meses ativos &middot; total medido ' + fmtBRL(n.TOTAL) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="cardbig ' + cls + '">' +
        '<div class="econ-lbl">' + lblEcon + '</div>' +
        '<div class="econ-pct">' + lblPct + '</div>' +
        '<div class="econ-val">' + (isEconomia?'-':'+') + ' ' + fmtBRL(Math.abs(dif)) + ' / mes</div>' +
        '<div class="econ-ano">' + (isEconomia?'economia':'aumento') + ' anual projetada<br><strong>' + fmtBRL(valAno) + '</strong></div>' +
      '</div>' +
    '</div>' +
    '<div class="charts">' +
      '<div class="chart-box"><h3>Comparativo - Media mensal</h3><canvas id="bar-' + seg.id + '"></canvas></div>' +
      '<div class="chart-box"><h3>Evolucao mensal (acumulada)</h3><canvas id="line-' + seg.id + '"></canvas></div>' +
    '</div>';
  segsDiv.appendChild(div);

  // bar
  new Chart(document.getElementById('bar-' + seg.id), {
    type:'bar',
    data:{
      labels:[seg.old.label + ' (ant)', seg.novo.label + ' (novo)'],
      datasets:[{ data:[o.MEDIA, n.MEDIA], backgroundColor:['#e74c3c','#2ecc71'], borderRadius:8, barThickness:50 }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:c => fmtBRL2(c.raw) + ' / mes' } } },
      scales:{
        y:{ ticks:{color:'#888', callback:v=>'R$ '+(v/1000).toFixed(0)+'k'}, grid:{color:'#2d3742'} },
        x:{ ticks:{color:'#bbb'}, grid:{display:false} }
      }
    }
  });
  // line - acumulada
  const oMo = byMonth[seg.old.cod] || {};
  const nMo = byMonth[seg.novo.cod] || {};
  const allM = [...new Set([...Object.keys(oMo), ...Object.keys(nMo)])].sort();
  let oAcc=0, nAcc=0;
  const oS = allM.map(m => { oAcc += (oMo[m]||0); return oMo[m]!==undefined ? oAcc : null; });
  const nS = allM.map(m => { nAcc += (nMo[m]||0); return nMo[m]!==undefined ? nAcc : null; });
  new Chart(document.getElementById('line-' + seg.id), {
    type:'line',
    data:{
      labels: allM.map(ymLbl),
      datasets:[
        { label: seg.old.label + ' (ant)',  data:oS, borderColor:'#e74c3c', borderWidth:2, tension:.25, pointRadius:2, fill:false, spanGaps:true },
        { label: seg.novo.label + ' (novo)',data:nS, borderColor:'#2ecc71', borderWidth:2, tension:.25, pointRadius:2, fill:false, spanGaps:true }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{labels:{color:'#ccc',font:{size:11}}}, tooltip:{ callbacks:{ label:c => c.dataset.label+': '+fmtBRL(c.raw) } } },
      scales:{
        y:{ ticks:{color:'#888', callback:v=>'R$ '+(v/1000).toFixed(0)+'k'}, grid:{color:'#2d3742'} },
        x:{ ticks:{color:'#888',maxRotation:60,minRotation:45,font:{size:10}}, grid:{display:false} }
      }
    }
  });
});

// painel novo escopo (GHV + MarIA AWS)
const g = byCod[NOVO_ESCOPO.cod];
const aws = NOVO_ESCOPO.awsAdic;
const totalSV = g.MEDIA + aws;
const totalSVano = totalSV * 12;
const gdiv = document.createElement('div');
gdiv.className = 'seg';
gdiv.innerHTML =
  '<h2>' + NOVO_ESCOPO.titulo + '  <span class="badge-info">novo servico</span></h2>' +
  '<div class="desc">Composto por: GHV TECNOLOGIA (link/conectividade) + ' + NOVO_ESCOPO.awsLabel + ' (infra cloud). Sem fornecedor antigo direto - nao entra no calculo de economia.</div>' +
  '<div class="compare-grid">' +
    '<div class="cardbig new">' +
      '<div><div class="lbl new">Fornecedor</div><div class="nm">' + NOVO_ESCOPO.label + '</div></div>' +
      '<div>' +
        '<div class="total">Media mensal</div>' +
        '<div class="mensal">' + fmtBRL(g.MEDIA) + '</div>' +
        '<div class="info">' + g.MESES + ' meses ativos &middot; total medido ' + fmtBRL(g.TOTAL) + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="arrow-box">+</div>' +
    '<div class="cardbig new" style="border-left-color:#f39c12">' +
      '<div><div class="lbl new" style="color:#ffd699">Infra Cloud</div><div class="nm">' + NOVO_ESCOPO.awsLabel + '</div></div>' +
      '<div>' +
        '<div class="total">Custo mensal</div>' +
        '<div class="mensal">' + fmtBRL(aws) + '</div>' +
        '<div class="info">valor fixo recorrente</div>' +
      '</div>' +
    '</div>' +
    '<div class="cardbig econ" style="background:linear-gradient(135deg,#1a2738 0%,#2a4a6b 100%);border-color:#5cc8ff">' +
      '<div class="econ-lbl" style="color:#9ed8f5">Custo total SV/Link</div>' +
      '<div class="econ-pct" style="color:#5cc8ff;font-size:42px">' + fmtBRL(totalSV) + '</div>' +
      '<div class="econ-val" style="font-size:14px;margin-top:4px">por mes</div>' +
      '<div class="econ-ano" style="color:#9ed8f5">projecao anual<br><strong>' + fmtBRL(totalSVano) + '</strong></div>' +
    '</div>' +
  '</div>' +
  '<div class="footer-note">' + NOVO_ESCOPO.label + ' recorrente (' + fmtBRL(g.MEDIA) + '/mes) + ' + NOVO_ESCOPO.awsLabel + ' (' + fmtBRL(aws) + '/mes) = <strong>' + fmtBRL(totalSV) + '/mes</strong>. Este e o gasto efetivo do novo escopo Servidor/Link, sem antecedente comparavel no parque antigo.</div>';
segsDiv.appendChild(gdiv);
</script>
</body>
</html>
